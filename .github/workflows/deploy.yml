name: CI/CD — AGRIFRIK ERP

on:
  push:
    branches:
      - master

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /var/www/agrifrik/erp
            git pull origin master
            npm ci --production=false
            npm run build
            pm2 restart agrifrik-erp

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, deploy]
    if: always()
    steps:
      - name: Deployment success
        if: needs.deploy.result == 'success'
        run: echo "Deployment to VPS succeeded for commit ${{ github.sha }}"

      - name: Deployment failure
        if: needs.deploy.result != 'success'
        run: echo "Deployment FAILED for commit ${{ github.sha }} — check logs above"
